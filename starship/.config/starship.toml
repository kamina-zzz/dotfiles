add_newline = false
format = """
[kamina ](green)[${directory} ](bold blue)${git_branch}${git_status}[\\$ ](white)
"""
[directory]
truncation_length = 4
style = "bold blue"
[git_branch]
format = "[\\(](bold cyan)[$branch](bold red)"
[git_status]
format = "[$modified]($style)[\\)](bold cyan) "
style = "bold yellow"
modified = " ✗"
